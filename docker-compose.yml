services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.0.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - kafka-network

  kafka1:
    image: confluentinc/cp-kafka:7.0.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka1:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1  # Меняем с 2 на 1, так как у нас 1 брокер
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1     # Меняем с 2 на 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1  # Меняем с 2 на 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true      # Включаем автосоздание топиков
    networks:
      - kafka-network
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Только для первичной инициализации топиков =)
  kafka-init:
    image: confluentinc/cp-kafka:7.0.1
    networks:
      - kafka-network
    depends_on:
      kafka1:
        condition: service_healthy
    command: >
      bash -c "
        kafka-topics --create --if-not-exists --bootstrap-server kafka1:9092 --topic messages &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka1:9092 --topic filtered_messages &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka1:9092 --topic blocked_users &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka1:9092 --topic banned_words
      "

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.0
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka1:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - kafka-network
    depends_on:
      - kafka1

  producer:
    build:
      context: .
      dockerfile: producer/Dockerfile
    depends_on:
      kafka1:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - kafka-network
    volumes:
      - ./producer:/app
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload

  consumer:
    build:
      context: .
      dockerfile: consumer/Dockerfile
    depends_on:
      kafka1:
        condition: service_healthy
    networks:
      - kafka-network

  processor:
    build:
      context: .
      dockerfile: processor/Dockerfile
    depends_on:
      kafka1:
        condition: service_healthy
    networks:
      - kafka-network
    # volumes:
    #   - ./producer:/app  # Монтируем только папку producer
    # working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    #command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload

networks:
  kafka-network:
    driver: bridge