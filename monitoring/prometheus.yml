global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "kafka-connect"
    static_configs:
      - targets: ["kafka-connect:8084"]
        labels:
          service: "kafka-connect"

  - job_name: "kafka-connect-jmx"
    metrics_path: /metrics
    static_configs:
      - targets: ["kafka-connect:8084"]
