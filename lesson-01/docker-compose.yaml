services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.0.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - kafka-network

  kafka1:
    image: confluentinc/cp-kafka:7.0.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka1:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: false
    networks:
      - kafka-network
    depends_on:
      - zookeeper

  kafka2:
    image: confluentinc/cp-kafka:7.0.1
    ports:
      - "9093:9092"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka2:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: false
    networks:
      - kafka-network
    depends_on:
      - zookeeper

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.0
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka1:9092,kafka2:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - kafka-network
    depends_on:
      - kafka1
      - kafka2

  # Продюсер (один экземпляр)
  producer:
    build:
      context: .
      dockerfile: producer/Dockerfile
    depends_on:
      - kafka1
      - kafka2
    environment:
      BOOTSTRAP_SERVERS: kafka1:9092,kafka2:9092
      TOPIC: my-topic
    networks:
      - kafka-network
    restart: on-failure

  # Single-message consumer (2 экземпляра с одинаковым group.id)
  consumer-single:
    build:
      context: .
      dockerfile: consumer_single/Dockerfile
    depends_on:
      - kafka1
      - kafka2
    environment:
      BOOTSTRAP_SERVERS: kafka1:9092,kafka2:9092
      TOPIC: my-topic
      GROUP_ID: single-consumer-group
    networks:
      - kafka-network
    deploy:
      replicas: 2
    restart: on-failure

  # Batch consumer (2 экземпляра с одинаковым group.id)
  consumer-batch:
    build:
      context: .
      dockerfile: consumer_batch/Dockerfile
    depends_on:
      - kafka1
      - kafka2
    environment:
      BOOTSTRAP_SERVERS: kafka1:9092,kafka2:9092
      TOPIC: my-topic
      GROUP_ID: batch-consumer-group
    networks:
      - kafka-network
    deploy:
      replicas: 2
    restart: on-failure

networks:
  kafka-network:
    driver: bridge
